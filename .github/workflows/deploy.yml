---
name: "Deploy to VPS"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            echo ">>> Pulling latest code..."
            cd /var/www/mediacms
            git pull

            echo ">>> Fixing permissions..."
            chmod +x deploy/docker/entrypoint.sh
            chmod +x deploy/docker/prestart.sh
            chmod +x deploy/docker/start.sh

            echo ">>> Building frontend assets..."
            docker run --rm \
              -v /var/www/mediacms/frontend:/home/mediacms.io/mediacms/frontend \
              -w /home/mediacms.io/mediacms/frontend \
              node:20 \
              bash -c "npm install && npm run dist"

            echo ">>> Copying static files..."
            cp -r frontend/dist/static/* static/ || echo "No static files to copy"

            echo ">>> Restarting services..."
            docker compose up -d --force-recreate --remove-orphans

            echo ">>> Pruning old Docker images..."
            docker image prune -f

            echo ">>> Deploy complete!"
